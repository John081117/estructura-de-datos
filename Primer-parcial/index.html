<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FUTTZAP - Tienda de Fútbol</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Contenedor del Header (se carga dinámicamente) -->
  <div id="header-container"></div>

  <!-- Contenedor Principal -->
  <div class="container">
    <!-- Contenedor del Sidebar (se carga dinámicamente) -->
    <div id="sidebar-container"></div>

    <!-- Contenido Principal -->
    <main class="main-content">
      <h1>Bienvenido a FUTTZAP</h1>
      <p>Encuentra zapatillas de fútbol para césped, sintética y microfútbol con la mejor tracción y diseño.</p>

      <div class="search-box">
        <input id="product-search" type="text" placeholder="Buscar por nombre de producto..." />
      </div>

      <!-- Plantilla reutilizable de producto -->
      <template id="product-template">
        <div class="product-card">
          <div class="product-image"></div>
          <div class="product-info">
            <div class="product-name"></div>
            <div class="product-price"></div>
            <div class="product-description"></div>
            <button class="product-button">Agregar al carrito</button>
          </div>
        </div>
      </template>

      <!-- Contenedor de productos para Template -->
      <div id="products-template-container" class="products-grid"></div>

      <!-- Contenedor de productos para Web Components -->
      <div id="products-webcomponents-container" class="products-grid"></div>
    </main>
  </div>

  <!-- Contenedor del Footer (se carga dinámicamente) -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/components-loader.js"></script>
  <script src="js/products-manager.js"></script>
  <script src="js/web-components.js"></script>

  <script>
    /**
     * Script principal - Inicializa la aplicación
     * Carga componentes y productos al cargar la página
     */

    let loadedProducts = [];

    document.addEventListener('DOMContentLoaded', async function() {
      console.log('🚀 Inicializando SneakerHub...');

      // 1. Cargar componentes reutilizables
      console.log('📦 Cargando componentes...');
      await loadComponents([
        { path: './components/header/header.html', targetId: 'header-container' },
        { path: './components/sidebar/sidebar.html', targetId: 'sidebar-container' },
        { path: './components/footer/footer.html', targetId: 'footer-container' }
      ]);

      // 2. Cargar productos desde JSON
      console.log('📊 Cargando datos de productos...');
      loadedProducts = await loadProducts();

      if (loadedProducts.length > 0) {
        console.log('🎯 Aplicando filtro de categoría e inicializando productos...');
        applyCategoryFilter();
      }

      renderCart();
      console.log('✅ Aplicación lista');
    });

    // Agregar eventos a los botones de Template (delegación de eventos)
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('product-button')) {
        const productId = e.target.getAttribute('data-product-id');
        addToCart(productId);
      }
    });

    // Escuchar eventos custom desde los web components
    document.addEventListener('add-to-cart', function(event) {
      const productId = event.detail?.id;
      if (productId) {
        addToCart(productId);
      }
    });

    // Botones de carrito (incrementar, decrementar, eliminar)
    document.addEventListener('click', function(event) {
      if (event.target.classList.contains('cart-remove')) {
        removeFromCart(event.target.dataset.productId);
      }

      if (event.target.classList.contains('cart-decrement')) {
        decrementCartItem(event.target.dataset.productId);
      }

      if (event.target.classList.contains('cart-increment')) {
        addToCart(event.target.dataset.productId);
      }
    });

    // Manejo de categorías con hash en URL (ej: #cesped)
    function applyCategoryFilter() {
      const rawHash = window.location.hash.slice(1).toLowerCase();
      const category = rawHash === '' || rawHash === 'all' ? 'all' : rawHash;

      const listAll = category === 'all' ? loadedProducts : filterProductsByCategory(category);
      const search = document.getElementById('product-search').value.trim().toLowerCase();
      const filtered = search
        ? listAll.filter(product => product.name.toLowerCase().includes(search))
        : listAll;

      document.querySelectorAll('#category-menu a').forEach(link => {
        const linkCat = link.getAttribute('href').slice(1).toLowerCase();
        link.classList.toggle('active', linkCat === category);
      });

      if (filtered.length === 0) {
        document.getElementById('products-template-container').innerHTML = '<p class="no-products">No hay productos en esta categoría/consulta.</p>';
        document.getElementById('products-webcomponents-container').innerHTML = '';
        return;
      }

      renderProductsWithTemplate(filtered.slice(0, 3), 'products-template-container');
      renderProductsWithWebComponents(filtered.slice(3), 'products-webcomponents-container');
    }

    // Filtrar en vivo mientras el usuario escribe
    document.getElementById('product-search').addEventListener('input', applyCategoryFilter);

    window.addEventListener('hashchange', applyCategoryFilter);
  </script>
</body>
</html>
