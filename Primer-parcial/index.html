<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SneakerHub - Tu Tienda de Zapatillas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Contenedor del Header (se carga dinámicamente) -->
  <div id="header-container"></div>

  <!-- Contenedor Principal -->
  <div class="container">
    <!-- Contenedor del Sidebar (se carga dinámicamente) -->
    <div id="sidebar-container"></div>

    <!-- Contenido Principal -->
    <main class="main-content">
      <h1>Bienvenido a SneakerHub</h1>
      <p>Descubre nuestra colección exclusiva de zapatillas de las mejores marcas del mundo.</p>

      <!-- Plantilla reutilizable de producto -->
      <template id="product-template">
        <div class="product-card">
          <div class="product-image"></div>
          <div class="product-info">
            <div class="product-name"></div>
            <div class="product-price"></div>
            <div class="product-description"></div>
            <button class="product-button">Agregar al carrito</button>
          </div>
        </div>
      </template>

      <!-- Contenedor de productos para Template -->
      <div id="products-template-container" class="products-grid"></div>

      <!-- Contenedor de productos para Web Components -->
      <div id="products-webcomponents-container" class="products-grid"></div>
    </main>
  </div>

  <!-- Contenedor del Footer (se carga dinámicamente) -->
  <div id="footer-container"></div>

  <!-- Scripts -->
  <script src="js/auth.js"></script>
  <script src="js/components-loader.js"></script>
  <script src="js/products-manager.js"></script>
  <script src="js/web-components.js"></script>

  <script>
    /**
     * Script principal - Inicializa la aplicación
     * Carga componentes y productos al cargar la página
     */

    document.addEventListener('DOMContentLoaded', async function() {
      console.log('🚀 Inicializando SneakerHub...');

      // 1. Cargar componentes reutilizables
      console.log('📦 Cargando componentes...');
      await loadComponents([
        { path: './components/header/header.html', targetId: 'header-container' },
        { path: './components/sidebar/sidebar.html', targetId: 'sidebar-container' },
        { path: './components/footer/footer.html', targetId: 'footer-container' }
      ]);

      // 2. Cargar productos desde JSON
      console.log('📊 Cargando datos de productos...');
      const products = await loadProducts();

      if (products.length > 0) {
        // 3. Renderizar con Template HTML (primeros 3 productos)
        console.log('🎨 Renderizando productos con Template...');
        const templateProducts = products.slice(0, 3);
        renderProductsWithTemplate(templateProducts, 'products-template-container');

        // 4. Renderizar con Web Components (últimos 3 productos)
        console.log('🧩 Renderizando productos con Web Components...');
        const webComponentProducts = products.slice(3);
        renderProductsWithWebComponents(webComponentProducts, 'products-webcomponents-container');
      }

      console.log('✅ Aplicación lista');
    });

    // Agregar eventos a los botones de Template (delegación de eventos)
    document.addEventListener('click', function(e) {
      if (e.target.classList.contains('product-button')) {
        const productCard = e.target.closest('.product-card');
        const productName = productCard.querySelector('.product-name').textContent;
        alert(`✅ "${productName}" agregado al carrito`);
        console.log(`Producto agregado: ${productName}`);
      }
    });
  </script>
</body>
</html>
